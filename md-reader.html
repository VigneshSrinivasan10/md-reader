<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292e;
            line-height: 1.6;
        }

        header {
            background-color: #24292e;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .upload-btn {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .upload-btn:hover {
            background-color: #2c974b;
        }

        .container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .drop-zone {
            border: 2px dashed #d0d7de;
            border-radius: 12px;
            padding: 60px 24px;
            text-align: center;
            background-color: #ffffff;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .drop-zone.dragover {
            border-color: #2ea44f;
            background-color: #f0fff4;
        }

        .drop-zone p {
            font-size: 16px;
            color: #57606a;
            margin-top: 8px;
        }

        .drop-zone .icon {
            font-size: 48px;
            color: #d0d7de;
        }

        #file-input {
            display: none;
        }

        .markdown-body {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 32px 40px;
            font-size: 16px;
            line-height: 1.8;
            display: none;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }

        .markdown-body h1 { font-size: 2em; }
        .markdown-body h2 { font-size: 1.5em; }
        .markdown-body h3 { font-size: 1.25em; border-bottom: none; }
        .markdown-body h4 { font-size: 1em; border-bottom: none; }

        .markdown-body p {
            margin-bottom: 16px;
        }

        .markdown-body code {
            background-color: #f0f3f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 85%;
        }

        .markdown-body pre {
            background-color: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .markdown-body pre code {
            background: none;
            padding: 0;
            font-size: 85%;
        }

        .markdown-body blockquote {
            border-left: 4px solid #d0d7de;
            padding: 0 16px;
            color: #57606a;
            margin-bottom: 16px;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 2em;
            margin-bottom: 16px;
        }

        .markdown-body li {
            margin-bottom: 4px;
        }

        .markdown-body a {
            color: #0969da;
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: 6px;
        }

        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid #d0d7de;
            padding: 8px 12px;
            text-align: left;
        }

        .markdown-body th {
            background-color: #f6f8fa;
            font-weight: 600;
        }

        .markdown-body hr {
            border: none;
            border-top: 2px solid #d0d7de;
            margin: 24px 0;
        }

        .file-name {
            font-size: 14px;
            color: #57606a;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>MD Reader</h1>
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">Open File</button>
    </header>

    <div class="container">
        <input type="file" id="file-input" accept=".md,.markdown,.txt">

        <div class="drop-zone" id="drop-zone">
            <div class="icon">&#128196;</div>
            <p>Drop a Markdown file here or click to open</p>
        </div>

        <div class="file-name" id="file-name"></div>
        <div class="markdown-body" id="output"></div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const output = document.getElementById('output');
        const fileNameEl = document.getElementById('file-name');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) readFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) readFile(file);
        });

        function readFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const md = e.target.result;
                output.innerHTML = parseMarkdown(md);
                output.style.display = 'block';
                dropZone.style.display = 'none';
                fileNameEl.textContent = file.name;
                fileNameEl.style.display = 'block';
            };
            reader.readAsText(file);
        }

        function parseMarkdown(text) {
            let html = text;

            // Escape HTML
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Code blocks (fenced)
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headings
            html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
            html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
            html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

            // Horizontal rules
            html = html.replace(/^---+$/gm, '<hr>');

            // Bold and italic
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Images
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

            // Blockquotes
            html = html.replace(/^&gt;\s+(.+)$/gm, '<blockquote><p>$1</p></blockquote>');

            // Unordered lists
            html = html.replace(/^[\*\-]\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

            // Paragraphs
            html = html.replace(/^(?!<[a-z])(.*\S.*)$/gm, '<p>$1</p>');

            // Clean up empty paragraphs
            html = html.replace(/<p><\/p>/g, '');

            return html;
        }
    </script>
</body>
</html>
